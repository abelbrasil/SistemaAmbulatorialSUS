
services:

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: backend_api
    restart: always
    env_file:
      - .env
    volumes:
      - ./data:/app/data   # 🔥 persistência (SQLite + arquivos pipeline)
    ports:
      - "8000:8000"
    command: >
      uvicorn backend.main:app
      --host 0.0.0.0
      --port 8000
      --reload

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: frontend_app
    restart: always
    depends_on:
      - backend
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    ports:
      - "8501:8501"
    command: >
      streamlit run frontend/app.py
      --server.port=8501
      --server.address=0.0.0.0